    #canvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:all;}
    #text-panel{position:fixed;right:0;top:0;bottom:0;width:min(420px,90vw);background:#e3e3e3;transform:translateX(100%);transition:transform .65s cubic-bezier(.16,1,.3,1);z-index:50;display:flex;flex-direction:column;padding:3.2rem 2.6rem 2.4rem;border-left:1px solid rgba(0,0,0,.08);}
    #text-panel.open{transform:translateX(0);}
    #panel-close{position:absolute;top:1.4rem;right:1.6rem;background:none;border:none;cursor:pointer;font-family:'Share Tech',monospace;font-size:.7rem;letter-spacing:.18em;color:#000;opacity:.4;text-transform:uppercase;}
    #panel-close:hover{opacity:1;}
    #panel-tag{font-family:'Share Tech',monospace;font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:#000;opacity:.38;margin-bottom:1.8rem;}

    #panel-body{font-family:'Share Tech',monospace;font-size:.78rem;line-height:1.85;color:#000;overflow-y:auto;flex:1;padding-right:.3rem;}
    #panel-body p.blue { color: #0000DD;}
    #panel-body div.blue { color: #0000DD;}
    #panel-body div.blue p { color: #0000DD;}
    #panel-body::-webkit-scrollbar{width:1px;}
    #panel-body::-webkit-scrollbar-thumb{background:#000;}
    #panel-body p{margin-bottom:1.1em;}
    #panel-body em{font-style:italic;}
    #panel-body .poem-line{display:flex;align-items:baseline;margin-bottom:.28em;gap:.6em;}
    #panel-body .poem-word{flex-shrink:0;min-width:9em;font-size:.6rem;letter-spacing:.07em;opacity:.36;text-transform:uppercase;}
    #panel-body hr.divider{border:none;border-top:1px solid rgba(0,0,0,.12);margin:1em 0;}
    #panel-credit{margin-top:1.8rem;padding-top:1.3rem;border-top:1px solid rgba(0,0,0,.1);font-family:'Share Tech',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:#000;opacity:.36;}
    #nav{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;gap:1.6rem;z-index:40;}
    .nav-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,.25);cursor:pointer;transition:background .3s,transform .3s;}
    .nav-dot.active{background:#000;transform:scale(1.5);}
    #credit{position:fixed;bottom:2rem;left:2rem;font-family:'Share Tech',monospace;font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.38);z-index:40;}
    #instruction {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Share Tech', monospace;
  font-size: 1.1rem;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(0,0,0,.55);
  z-index: 40;
  transition: opacity 2s ease;
  pointer-events: none;
}
#instruction.hidden { opacity: 0; }

const OBJECTS=[
  {tag:"A Small Lexicon of Touch",title:"To touch is to take space",credit:"Karo Hall, 2026",
    color:0x0000bb,roughness:.02,metalness:.99,
    body:`<span class="poem-line"><span class="poem-word">Reality</span><span>To touch is to take space</span></span><span class="poem-line"><span class="poem-word">Utopia</span><span>To touch is to take space</span></span><span class="poem-line"><span class="poem-word">Transgression</span><span>To touch is to take space</span></span><span class="poem-line"><span class="poem-word">Empowerment</span><span>To touch is to take space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Empowerment</span><span>To touch is to demonstrate space</span></span><span class="poem-line"><span class="poem-word">Pedagogy</span><span>To touch is to demonstrate space</span></span><span class="poem-line"><span class="poem-word">Communication</span><span>To touch is to demonstrate space</span></span><span class="poem-line"><span class="poem-word">Entitlement</span><span>To touch is to demonstrate space</span></span><span class="poem-line"><span class="poem-word">Arrogance</span><span>To touch is to demonstrate space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Possibility</span><span>To touch is to make space</span></span><span class="poem-line"><span class="poem-word">Discovery</span><span>To touch is to make space</span></span><span class="poem-line"><span class="poem-word">Healing</span><span>To touch is to make space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Discovery</span><span>To touch is to unveil naked space</span></span><span class="poem-line"><span class="poem-word">Audacity</span><span>To touch is to unveil naked space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Responsibility</span><span>To touch is to shake space</span></span><span class="poem-line"><span class="poem-word">Power</span><span>To touch is to shake space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Vulnerability</span><span>To touch is to break space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Violence</span><span>To touch is to overtake someone else&#39;s space</span></span><hr class="divider"/><span class="poem-line"><span class="poem-word">Retribution</span><span>To touch is to compensate for lost space</span></span>`},
  {tag:"On the Tactile",title:"Touch gets under our skin",credit:"Karo Hall, 2026",
  color:0x0000bb,roughness:.02,metalness:.99,envScale:1.2,
    body:`<p>Touch, and the tactile, are loaded concepts. Touch, and the tactile, are also deeply temporal concepts. In some instances, at some times, and with some people, an event of touch is accepted and even welcomed, in others, met with rejection. Touch is often synonymous with intimacy, since touch requires physical proximity. Or does it? One could argue that we are able to touch one another with the sheer direction and intensity of one’s gaze. A topic of discussion can be touched upon within discourse. Touch and the tactile carries and is carried by direction: Touch can carry a wide array of different qualities, but touch is never neutral.</p><p>As the attentive reader has noticed I’m making distinctions between touch and the tactile. For the purposes of this exposition, I define touch as a specific event in space and time and the tactile as a general modality. Touch as an event can be considered as an experience that is somatically felt while the tactile can be viewed as a dimension, a vessel, a tool, a practice, a portal, a technology. Is the tactile the first of our senses; for ourselves, in the womb, and as a species during a former stage of evolution? I believe so. Some senses are dimmable. Earplugs can shut noise out, eyes can be veiled with a piece of cloth or our eyelids. Touch gets under our skin.</p><p>I want to explore the tactile as an empirical method. What happens when we listen with our skin? What information exists beneath the surface? What other types of intelligences are there, beyond the verbal and the cognitive?</p><p>Is touch associated with a passive state? In a way I would say so. Touch is like hearing, yet there is with touch as with hearing a distinction between merely hearing and actively listening: The mind can direct little or a lot of attention towards the event. Touch is a bridge between bodies.</p><p class="blue"><em>I touch the ground with my feet, thus moving forward.<br> Am I touching my future body?</em></p>`},
  {tag:"Workshop, SKH 2026",title:"Tactile Archaeology",credit:"Karo Hall, 2026",
    color:0x0000bb,roughness:.02,metalness:.99,
    body:`<div class="blue">
<p>The world is a vessel<br>
It carries your dreams in its currents<br>And your body as well<br>Can you hear the whale singing?</p>
<p>Just like the world<br>
Your body is a vessel<br>
It carries your inner longings<br>
And the paths you have traversed<br></p>
<p>What can you discover<br>
That is already there?<br>
What is already there<br>
For you to discover?</p>
<p>I think Jodorowsky would say something like<br>
You are a mountain<br>
Filled with cave paintings<br>
And I would respond with a question<p/>
<p><em>Did you look at them today?</em></p></div>
<p><strong>Tactile Archaeology</strong> is a workshop that explores the tactile sense as a dimension to enter, and touch as an empirical technology. The core question is <em>can we listen with our skin?</em></p><p>The body is understood here as an archive, a landscape with layers, carrying traces from earlier experiences.</p><p><strong>Landing (5 min):</strong> Participants lie or sit on the floor, invited to sink into the ground on the exhale.</p><p><strong>Tactile Archaeology (5 min):</strong> Participants divide into pairs: the Mountain and the Archaeologist. The Mountain shares which digging sites are available. The Archaeologist gives tactile input for three minutes.</p><p><strong>Role reversal (5 min):</strong> The pairs switch. Both are givers and receivers, both researchers and landscape.</p><p>Consent is built into the structure. The Archaeologist must ask, and above all, listen.</p><p>The workshop was developed during the course <em>Workshop som format och konstnärlig metod</em> at Stockholms Konstnärliga Högskola.</p>`},
  {tag:"Helix Art Space, June 2026",title:"Body of Work",credit:"Karo Hall & Jakob Skote, 2026",textcredit:"Text by Jakob Skote",
    color:0xff0044,roughness:.02,metalness:.99,envScale:1.2,
    body:`<p>Technology opens up new ways for art to include the body of the audience. Contemporary art is primarily focused on our two main senses, vision and sound, leaving out the somatic.</p><p>Haptics, sensors, and other new technologies are enabling art where your body becomes the material for the work. When touch becomes the site of the artwork, it can&#39;t be photographed or recorded. It exists only in your body.</p><p>Touch is complex to work with. There is little terminology, few shared references, no defined frameworks.</p><p>This event is part workshop, part exhibition, part laboratory, bringing together artists in Sweden who are defining this field.</p><p><em>Helix Art Space, June 2&#8211;5. All invited.</em></p><p><div class="blue"><a href="http://bodyofwork.se/" target="_blank" style="color:#000;text-decoration:underline;">bodyofwork.se</a></p></div>`}
];

// Platform positions matched to the photo, y slightly above floor
// Camera at z=9, fov=50 — left platform at ~(-3.2, floor, 3.5), centre ~(0, floor, 1.8), right ~(3.2, floor, 3.5)
const POSITIONS=[
  new THREE.Vector3(-2.0, 0.3, 4.8),   // left front platform
  new THREE.Vector3( 0.0, 0.3, 2.8),   // centre-back platform
  new THREE.Vector3( 2.2, 0.3, 4.8),   // right front platform
  new THREE.Vector3( 2.8, 0.3, 1.8),   // 4th — tucked right-back
];
const baseY=POSITIONS.map(p=>p.y);

// Uniform scale: ignore Spline's distorted group scales entirely
// Use 0.28 so sculptures are compact and sit as objects on the platforms
const S = 0.28;

const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.9;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.setClearColor(0,0);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,100);
camera.position.set(0,.8,9);

const pmrem=new THREE.PMREMGenerator(renderer);
const envS=new THREE.Scene();envS.background=new THREE.Color(0xffffff);
scene.environment=pmrem.fromScene(envS).texture;
scene.add(new THREE.HemisphereLight(0xaaaaff,0x0000aa,0.4));
const kL=new THREE.DirectionalLight(0xfff8f2,2.8);kL.position.set(3,8,4);scene.add(kL);
const fL=new THREE.DirectionalLight(0xeef0ff,1.2);fL.position.set(-5,2,5);scene.add(fL);
const rL=new THREE.DirectionalLight(0xffe8d8,.6);rL.position.set(4,1,-4);scene.add(rL);

function makeMat(cfg){
  return new THREE.MeshStandardMaterial({
    color:cfg.color,roughness:cfg.roughness,
    metalness:cfg.metalness,envMapIntensity:1.2,
    side:THREE.DoubleSide
  });
}

const blobs=[];
SCULPT_DEFS.forEach((defs,i)=>{
  const mat=makeMat(OBJECTS[i]);
  const group=new THREE.Group();
  group.userData.index=i;
  // Uniform scale — ignore Spline's sy stretch
  group.scale.setScalar(S);

  defs.forEach(d=>{
    let mesh;
    if(d.type==='sphere'){
      mesh=new THREE.Mesh(new THREE.SphereGeometry(1,40,40),mat);
      mesh.scale.set(d.rx,d.ry,d.rz);
    }else{
      mesh=new THREE.Mesh(new THREE.TorusGeometry(d.outer,d.tube,18,64),mat);
    }
    mesh.position.set(d.x,d.y,d.z);
    mesh.rotation.set(d.ex,d.ey,d.ez);
    mesh.userData.groupRef=group;
    group.add(mesh);
  });

  // Centre group vertically so its bottom sits at y=0
  const box=new THREE.Box3().setFromObject(group);
  group.position.copy(POSITIONS[i]);
  group.position.y=POSITIONS[i].y - box.min.y;

  scene.add(group);
  blobs.push(group);
  baseY[i]=group.position.y;
});

const panel=document.getElementById('text-panel');
const navDots=document.querySelectorAll('.nav-dot');
const instruction=document.getElementById('instruction');
let hoveredBlob=null;
const mouse=new THREE.Vector2(-999,-999);
const raycaster=new THREE.Raycaster();

document.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
});

function openPanel(idx){
  const d=OBJECTS[idx];
  document.getElementById('panel-tag').textContent=d.tag;
  document.getElementById('panel-title').textContent=d.title;
  document.getElementById('panel-body').innerHTML=d.body;
  document.getElementById('panel-credit').textContent=d.textcredit?d.textcredit+' / '+d.credit:d.credit;
  panel.classList.add('open');
  navDots.forEach((dot,j)=>dot.classList.toggle('active',j===idx));
  instruction.classList.add('hidden');
}
document.getElementById('panel-close').addEventListener('click',()=>{
  panel.classList.remove('open');
  instruction.classList.remove('hidden');
});
document.addEventListener('click',e=>{
  if(panel.classList.contains('open')){
    if(!panel.contains(e.target)){
      panel.classList.remove('open');
      instruction.classList.remove('hidden');
      return;
    }
  }
  if(hoveredBlob!==null)openPanel(hoveredBlob);
});
navDots.forEach(dot=>dot.addEventListener('click',()=>openPanel(+dot.dataset.idx)));

const clock=new THREE.Clock();
setTimeout(() => {
  instruction.classList.add('hidden');
}, 3000);
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  blobs.forEach((b,i)=>{
    b.rotation.y=t*.12*(i%2===0?1:-1)+i*0.8;
    b.position.y=baseY[i]+Math.sin(t*.38+i*1.4)*.05;
  });
  raycaster.setFromCamera(mouse,camera);
  const allMeshes=[];blobs.forEach(b=>b.traverse(c=>{if(c.isMesh)allMeshes.push(c)}));
  const hits=raycaster.intersectObjects(allMeshes);
  if(hits.length>0){
    const group=hits[0].object.userData.groupRef||hits[0].object.parent;
    const idx=group.userData.index;
    if(hoveredBlob!==idx){
      hoveredBlob=idx;
      blobs.forEach((b,j)=>{b.traverse(c=>{if(c.isMesh&&c.material){
        c.material.emissive=new THREE.Color(j===idx?0x111111:0);
        c.material.emissiveIntensity=j===idx?.12:0;
      }});});
    }
    document.body.style.cursor='pointer';
  }else{
    if(hoveredBlob!==null){
      blobs.forEach(b=>b.traverse(c=>{if(c.isMesh&&c.material){c.material.emissive=new THREE.Color(0);c.material.emissiveIntensity=0;}}));
      hoveredBlob=null;
    }
    document.body.style.cursor='default';
  }
  camera.position.x=Math.sin(t*.03)*.1;
  camera.position.y=.8+Math.sin(t*.05)*.04;
  camera.lookAt(0,.3,0);
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
