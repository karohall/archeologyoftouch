const OBJECTS=[{tag:"A Small Lexicon of Touch",title:"To touch is to take space",credit:"Karo Hall, 2026",color:0xddddee,roughness:.04,metalness:.98,ns:1.8,nstr:.52,body:`<span class="poem-line"><span class="poem-word">Reality</span>To touch is to take space</span><span class="poem-line"><span class="poem-word">Utopia</span>To touch is to take space</span><span class="poem-line"><span class="poem-word">Transgression</span>To touch is to take space</span><span class="poem-line"><span class="poem-word">Empowerment</span>To touch is to take space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Empowerment</span>To touch is to demonstrate space</span><span class="poem-line"><span class="poem-word">Pedagogy</span>To touch is to demonstrate space</span><span class="poem-line"><span class="poem-word">Communication</span>To touch is to demonstrate space</span><span class="poem-line"><span class="poem-word">Entitlement</span>To touch is to demonstrate space</span><span class="poem-line"><span class="poem-word">Arrogance</span>To touch is to demonstrate space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Possibility</span>To touch is to make space</span><span class="poem-line"><span class="poem-word">Discovery</span>To touch is to make space</span><span class="poem-line"><span class="poem-word">Healing</span>To touch is to make space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Discovery</span>To touch is to unveil naked space</span><span class="poem-line"><span class="poem-word">Audacity</span>To touch is to unveil naked space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Responsibility</span>To touch is to shake space</span><span class="poem-line"><span class="poem-word">Power</span>To touch is to shake space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Vulnerability</span>To touch is to break space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Violence</span>To touch is to overtake someone else's space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Retribution</span>To touch is to compensate for lost space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Ignorance</span>To touch is to fake space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Longing</span>To touch is to ache for space</span><span class="poem-line"><span class="poem-word">Desperation</span>To touch is to ache for space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Choreography</span>To touch is to orchestrate space</span><hr class="divider"/><span class="poem-line"><span class="poem-word">Architect</span>To touch is to procreate more space</span>`},{tag:"On the Tactile",title:"Touch gets under our skin",credit:"Karo Hall, 2026",color:0x2222ee,roughness:.06,metalness:.96,ns:2.1,nstr:.4,body:`<p>Touch, and the tactile, are loaded concepts. They are also deeply temporal concepts. In some instances, at some times, and with some people, an event of touch is accepted and even welcomed; in others, met with rejection.</p><p>Touch is often synonymous with intimacy, since touch requires physical proximity. Or does it? One could argue that we are able to touch one another with the sheer direction and intensity of one's gaze.</p><p>For the purposes of this text: touch is a specific event in space and time — <em>this touch</em>. The tactile is a general modality. Touch as an event is somatically felt. The tactile is a dimension, a vessel, a tool, a practice, a portal, a technology.</p><p>Is the tactile the first of our senses? For ourselves, in the womb, and as a species during a former stage of evolution — I believe so. Some senses are dimmable: earplugs can shut noise out, eyes can be veiled. Touch gets under our skin.</p><p>The skin is our biggest organ. The human body has several different receptors for physical touch: mechanoreceptors, cells specialized in tactile phenomena. They channel different stimuli — prolonged light touch, skin stretching, vibration.</p><p>Touch is transactional. We can give touch and receive touch. The interpretation of touch is subjective. Touch is deeply personal. Touch is never neutral.</p><p><em>I touch the ground with my feet, thus moving forward. Am I touching my future body?</em></p>`},{tag:"Workshop — SKH 2026",title:"Tactile Archaeology",credit:"Karo Hall, 2026",color:0xdde0ee,roughness:.05,metalness:.97,ns:1.5,nstr:.58,body:`<p>Tactile Archaeology is a workshop that explores the tactile sense as a dimension to enter, and touch as an empirical technology. The core question: <em>can we listen with our skin?</em></p><p>The body is understood here as an archive — a landscape with layers, carrying traces from earlier experiences. The title refers to excavation, but not in a traumatic sense. It is about listening to what the body, the mountain, already knows.</p><p><strong>Landing (5 min)</strong> — Participants lie or sit on the floor, invited to sink into the ground on the exhale. A text about historical archaeological sites is read aloud, grounding the room in the metaphor of excavation and discovery.</p><p><strong>Tactile Archaeology (5 min)</strong> — Participants divide into pairs: the Mountain and the Archaeologist. The Mountain shares which digging sites are available. The Archaeologist gives tactile input for three minutes while the Mountain formulates a story based on sensation.</p><p><strong>Role reversal (5 min)</strong> — The pairs switch. Empathy and reciprocity arise through experiencing both positions. No one is expert. No one is object. Both are givers and receivers, both researchers and landscape.</p><p>Consent is built into the structure. The Mountain determines which digging sites are available. The Archaeologist must ask, and above all, listen.</p>`},{tag:"Helix Art Space — June 2026",title:"Body of Work",credit:"Karo Hall & Jakob Sköte, 2026",color:0x1111dd,roughness:.08,metalness:.95,ns:1.9,nstr:.46,body:`<p>Technology opens up new ways for art to include the body of the audience. Contemporary art is primarily focused on our two main senses — vision and sound — leaving out the somatic.</p><p>Haptics, sensors, and other new technologies are enabling art where your body becomes the material for the work. When touch becomes the site of the artwork, it can't be photographed or recorded. It exists only in your body.</p><p>Touch is complex to work with. There is little terminology, few shared references, and no defined frameworks. How do we exhibit it? How do we fund it? What responsibility do we have as artists when we work with the bodies of our audience?</p><p>This event is part workshop, part exhibition, part laboratory — bringing together artists in Sweden who are defining this field to discuss its challenges and contradictions. And most importantly, to get a feel for what it is.</p><p><em>The event takes place at Helix Art Space, June 2–5. All invited.</em></p><p><a href="http://bodyofwork.se/" target="_blank" style="color:#4a4640;text-decoration:underline;letter-spacing:.05em;">bodyofwork.se</a></p>`}];

renderer.setClearColor(0x000000,0);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,100);
camera.position.set(0,.5,9);
camera.lookAt(0,0,0);

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new THREE.RoomEnvironment()).texture;

scene.add(new THREE.AmbientLight(0xffffff,.7));
const key=new THREE.DirectionalLight(0xfff8f0,2.2);key.position.set(0,6,3);scene.add(key);
const fill=new THREE.DirectionalLight(0xe8f0ff,.9);fill.position.set(-4,2,5);scene.add(fill);
const rim=new THREE.DirectionalLight(0xffe8d8,.5);rim.position.set(4,1,-3);scene.add(rim);

function hash(n){const s=Math.sin(n)*43758.5453;return s-Math.floor(s);}
function noise3(x,y,z){const ix=Math.floor(x),iy=Math.floor(y),iz=Math.floor(z),fx=x-ix,fy=y-iy,fz=z-iz,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy),uz=fz*fz*(3-2*fz),a=hash(ix+iy*157+iz*113),b=hash(ix+1+iy*157+iz*113),c=hash(ix+(iy+1)*157+iz*113),d=hash(ix+1+(iy+1)*157+iz*113),e=hash(ix+iy*157+(iz+1)*113),f=hash(ix+1+iy*157+(iz+1)*113),g=hash(ix+(iy+1)*157+(iz+1)*113),h=hash(ix+1+(iy+1)*157+(iz+1)*113);return a+(b-a)*ux+(c-a)*uy+(d-b-c+a)*ux*uy+((e-a)+(a-b-e+f)*ux+(a-c-e+g)*uy+(b+c+e-a-d-f-g+h)*ux*uy)*uz;}
function fbm(x,y,z,o=4){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=a*noise3(x*f,y*f,z*f);a*=.5;f*=2;}return v;}

// Deform a geometry using fbm noise
function deformGeo(geo, ns, nstr, seed, sx=1, sy=1, sz=1) {
  const pos=geo.attributes.position, v=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i);
    const nx=v.x/sx, ny=v.y/sy, nz=v.z/sz;
    const len=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
    const d=fbm(nx*ns+seed*3.7, ny*ns+seed*2.1, nz*ns+seed*1.9)*nstr;
    v.x+=nx/len*d*sx; v.y+=ny/len*d*sy; v.z+=nz/len*d*sz;
    pos.setXYZ(i,v.x,v.y,v.z);
  }
  geo.computeVertexNormals();
  return geo;
}

// Build each sculpture as a THREE.Group of meshes — body + torus holes
function makeSculpture(cfg, seed) {
  const mat = new THREE.MeshStandardMaterial({
    color: cfg.color, roughness: cfg.roughness,
    metalness: cfg.metalness, envMapIntensity: 3.0,
    side: THREE.DoubleSide
  });
  const group = new THREE.Group();
  group.userData.isSculpture = true;

  // Each sculpture design defined by seed range
  const s = seed % 4;

  if (s < 1) {
    // Sculpture 0: tall elongated body, one large hole low, one small hole upper
    const body = deformGeo(new THREE.SphereGeometry(0.55, 80, 80), cfg.ns, cfg.nstr*0.6, seed);
    body.scale(0.9, 2.1, 0.7);
    group.add(new THREE.Mesh(body, mat));
    // Large torus hole near bottom
    const t1 = deformGeo(new THREE.TorusGeometry(0.28, 0.11, 24, 48), cfg.ns*0.8, cfg.nstr*0.4, seed+1);
    const tm1 = new THREE.Mesh(t1, mat);
    tm1.position.set(0.05, -0.85, 0); tm1.rotation.x=Math.PI/2+0.3; tm1.rotation.z=0.2;
    group.add(tm1);
    // Small torus hole upper
    const t2 = deformGeo(new THREE.TorusGeometry(0.14, 0.07, 20, 36), cfg.ns*0.9, cfg.nstr*0.3, seed+2);
    const tm2 = new THREE.Mesh(t2, mat);
    tm2.position.set(-0.05, 0.6, 0.1); tm2.rotation.x=Math.PI/2+0.5; tm2.rotation.z=-0.15;
    group.add(tm2);
    // Small bulge blob
    const b2 = deformGeo(new THREE.SphereGeometry(0.22, 40, 40), cfg.ns*1.2, cfg.nstr*0.8, seed+3);
    b2.scale(1,0.8,0.9);
    const bm2 = new THREE.Mesh(b2, mat); bm2.position.set(-0.35, -0.3, 0.1); group.add(bm2);

  } else if (s < 2) {
    // Sculpture 1: wide squat body, two holes, bumpy surface — cobalt
    const body = deformGeo(new THREE.SphereGeometry(0.7, 80, 80), cfg.ns, cfg.nstr*0.7, seed);
    body.scale(1.4, 0.9, 1.1);
    group.add(new THREE.Mesh(body, mat));
    const t1 = deformGeo(new THREE.TorusGeometry(0.22, 0.10, 22, 44), cfg.ns, cfg.nstr*0.5, seed+1);
    const tm1=new THREE.Mesh(t1,mat); tm1.position.set(-0.3,0.1,0.2); tm1.rotation.x=0.4; tm1.rotation.y=0.6; group.add(tm1);
    const t2 = deformGeo(new THREE.TorusGeometry(0.16, 0.08, 20, 36), cfg.ns, cfg.nstr*0.4, seed+2);
    const tm2=new THREE.Mesh(t2,mat); tm2.position.set(0.35,-0.15,-0.1); tm2.rotation.x=-0.3; tm2.rotation.z=0.5; group.add(tm2);
    const b2 = deformGeo(new THREE.SphereGeometry(0.3, 40, 40), cfg.ns*1.3, cfg.nstr, seed+3);
    b2.scale(0.8,1.1,0.7);
    const bm2=new THREE.Mesh(b2,mat); bm2.position.set(0.5,0.2,0); group.add(bm2);

  } else if (s < 3) {
    // Sculpture 2: medium body, one hole, elongated upward
    const body = deformGeo(new THREE.SphereGeometry(0.5, 80, 80), cfg.ns, cfg.nstr*0.65, seed);
    body.scale(0.8, 1.8, 0.75);
    group.add(new THREE.Mesh(body, mat));
    const t1 = deformGeo(new THREE.TorusGeometry(0.2, 0.09, 22, 44), cfg.ns*0.9, cfg.nstr*0.45, seed+1);
    const tm1=new THREE.Mesh(t1,mat); tm1.position.set(0.1,-0.5,0.05); tm1.rotation.x=Math.PI/2+0.4; tm1.rotation.z=0.3; group.add(tm1);
    const b2 = deformGeo(new THREE.SphereGeometry(0.28, 40, 40), cfg.ns*1.1, cfg.nstr*0.9, seed+2);
    b2.scale(1.1,0.7,0.8);
    const bm2=new THREE.Mesh(b2,mat); bm2.position.set(-0.3,0.55,0.1); group.add(bm2);
    const b3 = deformGeo(new THREE.SphereGeometry(0.18, 32, 32), cfg.ns*1.4, cfg.nstr, seed+4);
    const bm3=new THREE.Mesh(b3,mat); bm3.position.set(0.28,0.85,-0.05); group.add(bm3);

  } else {
    // Sculpture 3: compact vessel with two torus holes stacked — cobalt
    const body = deformGeo(new THREE.SphereGeometry(0.6, 80, 80), cfg.ns, cfg.nstr*0.6, seed);
    body.scale(1.1, 1.3, 0.9);
    group.add(new THREE.Mesh(body, mat));
    const t1 = deformGeo(new THREE.TorusGeometry(0.25, 0.11, 22, 44), cfg.ns*0.85, cfg.nstr*0.5, seed+1);
    const tm1=new THREE.Mesh(t1,mat); tm1.position.set(-0.05,-0.4,0.1); tm1.rotation.x=Math.PI/2+0.2; tm1.rotation.z=-0.15; group.add(tm1);
    const t2 = deformGeo(new THREE.TorusGeometry(0.18, 0.085, 20, 36), cfg.ns*0.9, cfg.nstr*0.4, seed+2);
    const tm2=new THREE.Mesh(t2,mat); tm2.position.set(0.1,0.35,-0.05); tm2.rotation.x=Math.PI/2+0.35; tm2.rotation.y=0.2; group.add(tm2);
    const b2 = deformGeo(new THREE.SphereGeometry(0.22, 36, 36), cfg.ns*1.2, cfg.nstr*0.85, seed+3);
    b2.scale(0.9,1.2,0.8);
    const bm2=new THREE.Mesh(b2,mat); bm2.position.set(0.4,0.1,0.05); group.add(bm2);
  }

  // Tag all children so raycasting can find the group
  group.children.forEach(c=>c.userData.groupRef=group);
  return group;
}

function makeBlob(cfg, seed) { return makeSculpture(cfg, seed); }

const blobDefs=[
  {pos:new THREE.Vector3(-4.2,.2,2.5),scale:.9},
  {pos:new THREE.Vector3(-.3,.5,.5),scale:.72},
  {pos:new THREE.Vector3(3.8,.3,1.8),scale:.85},
  {pos:new THREE.Vector3(1.2,.1,-2.2),scale:.78},
];

const blobs=[];
OBJECTS.forEach((cfg,i)=>{const m=makeBlob(cfg,i);const d=blobDefs[i];m.position.copy(d.pos);m.scale.setScalar(d.scale);m.userData.index=i;scene.add(m);blobs.push(m);});

const panel=document.getElementById('text-panel');
const navDots=document.querySelectorAll('.nav-dot');
const cursorEl=document.getElementById('cursor');
const cursorRing=document.getElementById('cursor-ring');
const instruction=document.getElementById('instruction');
let cx=0,cy=0,rx=0,ry=0,hoveredBlob=null;
const mouse=new THREE.Vector2(-999,-999);
const raycaster=new THREE.Raycaster();

document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;});

function openPanel(idx){const d=OBJECTS[idx];document.getElementById('panel-tag').textContent=d.tag;document.getElementById('panel-title').textContent=d.title;document.getElementById('panel-body').innerHTML=d.body;document.getElementById('panel-credit').textContent=d.credit;panel.classList.add('open');navDots.forEach((dot,i)=>dot.classList.toggle('active',i===idx));instruction.classList.add('hidden');}
document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));
document.addEventListener('click',()=>{if(hoveredBlob!==null)openPanel(hoveredBlob);});
navDots.forEach(dot=>dot.addEventListener('click',()=>openPanel(+dot.dataset.idx)));



const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  rx+=(cx-rx)*.1;ry+=(cy-ry)*.1;
  cursorEl.style.left=cx+'px';cursorEl.style.top=cy+'px';
  cursorRing.style.left=rx+'px';cursorRing.style.top=ry+'px';
  blobs.forEach((b,i)=>{b.rotation.y=t*.15*(i%2===0?1:-1)+i*1.1;b.rotation.x=Math.sin(t*.08+i*.9)*.12;b.position.y=blobDefs[i].pos.y+Math.sin(t*.45+i*1.4)*.12;});
  raycaster.setFromCamera(mouse,camera);
  // Collect all child meshes for intersection, then map back to parent group
  const allChildren=[];blobs.forEach(b=>b.children.forEach(c=>allChildren.push(c)));
  const hits=raycaster.intersectObjects(allChildren);
  if(hits.length>0){
    const hitGroup=hits[0].object.userData.groupRef||hits[0].object.parent;
    const idx=hitGroup.userData.index;
    if(hoveredBlob!==idx){hoveredBlob=idx;blobs.forEach((b,i)=>{b.children.forEach(c=>{if(c.material){c.material.emissive=new THREE.Color(i===idx?0x333028:0x000000);c.material.emissiveIntensity=i===idx?.15:0;}});});}
    cursorEl.classList.add('hovering');
  } else{
    if(hoveredBlob!==null){blobs.forEach(b=>b.children.forEach(c=>{if(c.material){c.material.emissive=new THREE.Color(0x000000);c.material.emissiveIntensity=0;}}));hoveredBlob=null;}
    cursorEl.classList.remove('hovering');
  }
  camera.position.x=Math.sin(t*.04)*.2;camera.position.y=.5+Math.sin(t*.06)*.08;camera.lookAt(0,.2,0);
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
